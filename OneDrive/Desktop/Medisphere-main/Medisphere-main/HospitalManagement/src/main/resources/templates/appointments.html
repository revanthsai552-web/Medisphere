<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between mb-3 align-items-center">
            <h2>Appointment Management Panel</h2>
            <a href="/dashboard" class="btn btn-secondary">← Back to Console</a>
        </div>
        <div class="card p-4 shadow-sm border-0 mb-4">
            <h5>Book New Appointment</h5>
            <form th:action="@{/appointments/book}" th:object="${newAppointment}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Assign Patient</label>
                    <select th:field="*{patient.id}" class="form-select" required>
                        <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Assign Medical Professional</label>
                    <select th:field="*{doctor.id}" class="form-select" required>
                        <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name + ' - ' + d.specialization}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date & Target Time</label>
                    <input type="datetime-local" th:field="*{appointmentTime}" class="form-control" required>
                </div>
                <div class="col-12"><button type="submit" class="btn btn-info text-white">Commit Booking</button></div>
            </form>
        </div>
        <div class="card p-4 shadow-sm border-0">
            <h5>Active Timetable</h5>
            <table class="table table-hover mt-2">
                <thead>
                    <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Scheduled Time</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${appointments}">
                        <td th:text="${app.id}"></td>
                        <td th:text="${app.patient.name}"></td>
                        <td th:text="${app.doctor.name}"></td>
                        <td th:text="${#temporals.format(app.appointmentTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <span class="badge" th:classappend="${app.status == 'BOOKED' ? 'bg-warning' : (app.status == 'COMPLETED' ? 'bg-success' : 'bg-danger')}" th:text="${app.status}"></span>
                        </td>
                        <td>
                            <form th:action="@{/appointments/update-status/{id}(id=${app.id})}" method="post" class="d-inline-block">
                                <select name="status" onchange="this.form.submit()" class="form-select form-select-sm d-inline-block w-auto">
                                    <option value="BOOKED" th:selected="${app.status == 'BOOKED'}">Mark Booked</option>
                                    <option value="COMPLETED" th:selected="${app.status == 'COMPLETED'}">Mark Completed</option>
                                    <option value="CANCELLED" th:selected="${app.status == 'CANCELLED'}">Cancel Session</option>
                                </select>
                            </form>
                            <a th:href="@{/appointments/cancel/{id}(id=${app.id})}" class="btn btn-sm btn-outline-danger align-bottom">Fast Cancel</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
